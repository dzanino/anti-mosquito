<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosquiter</title>
<style>
  :root{--card:#0e1d16;--stroke:#1b2c23;--accent:#a8e6cf;--accent2:#5cdc94;--text:#cfe5dc;--dim:#6f8a7e;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:linear-gradient(180deg,#0d1c15,#060d09);color:var(--text);text-align:center;padding:24px;}
  .logo{font-size:64px}
  h1{font-size:30px;margin:10px 0 4px;color:var(--accent)}
  p{color:var(--dim);margin:0 0 24px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-block;padding:12px 22px;border-radius:12px;text-decoration:none;font-weight:700;
        background:var(--card);border:1px solid var(--stroke);color:var(--accent)}
  a.btn:hover{border-color:var(--accent2)}
  .mail{margin-top:22px;font-size:14px}
  .mail a{color:var(--accent2)}
</style>
</head>
<body>
  <div>
    <div class="logo">🦟</div>
    <h1>Mosquiter</h1>
    <p>iPhone &amp; Apple Watch · experimental repeller</p>
    <div class="btns">
      <a class="btn" href="privacy.html">Privacy Policy</a>
      <a class="btn" href="support.html">Support</a>
    </div>
    <p class="mail">Contact: <a href="mailto:jansikuta@me.com">jansikuta@me.com</a></p>
  </div>
</body>
</html>
